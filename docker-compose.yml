services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: agora
      MINIO_ROOT_PASSWORD: agora-dev-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  agora-back:
    build: ./AgoraBack
    environment:
      NODE_ENV: development
      PORT: 8080
      NAS_S3_ENDPOINT: http://minio:9000
      NAS_S3_BUCKET: agora-blobs
      NAS_S3_ACCESS_KEY: agora
      NAS_S3_SECRET_KEY: agora-dev-password
      WORKER_SYNC_SECRET: dev-worker-sync-secret
      WORKER_SECRET: dev-worker-secret
      CRON_SECRET: dev-cron-secret
      FIREBASE_DATABASE_URL: http://firebase-emulator:9000
      NEXT_PUBLIC_ALLOW_INSECURE_AUTH: "true"
    ports:
      - "8080:8080"
    depends_on:
      - minio

  agora-hub:
    build: ./AgoraHub
    environment:
      PORT: 3010
      WORKER_SOCKET_SECRET: dev-worker-socket-secret
      WORKER_SECRET: dev-worker-secret
      CLIENT_ORIGIN: http://localhost:3000
      FIREBASE_PROJECT_ID: demo-agora
    ports:
      - "3010:3010"

  agora-worker:
    build: ./AgoraWorker/worker
    environment:
      NEXUS_URL: http://agora-hub:3010
      WORKER_TOKEN: workspace-dev
      WORKER_SOCKET_SECRET: dev-worker-socket-secret
      WORKER_SECRET: dev-worker-secret
    depends_on:
      - agora-hub
    volumes:
      - worker-workspace:/workspace

volumes:
  minio-data:
  worker-workspace:
